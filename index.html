<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Goblin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .online {
            color: green;
        }
        .offline {
            color: red;
        }
        form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: end;
        }
        input, select {
            padding: 10px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-size: 1rem;
        }
        input[type="number"] {
            width: 100px;
        }
        select {
            width: 150px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a6fd8;
        }
        .search {
            width: 100%;
            margin-bottom: 20px;
        }
        .search input {
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            background: white;
        }
        th {
            background: #f8f9fa;
            cursor: pointer;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        th:hover {
            background: #e9ecef;
        }
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        .card {
            display: none;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 15px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .actions {
            display: flex;
            gap: 5px;
        }
        .actions button {
            flex: 1;
        }
        .spinner {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner::after {
            content: "";
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            form {
                flex-direction: column;
            }
            input, select, button {
                width: 100%;
            }
            table {
                display: none;
            }
            .card {
                display: block;
            }
            .actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Biblioteca Goblin</h1>
    <div class="container">
        <div class="status" id="status">Offline</div>
        <div class="spinner" id="spinner"></div>
        <div class="search">
            <input type="text" id="search" placeholder="Buscar..." oninput="filterBooks()">
        </div>
        <form id="bookForm">
            <input type="text" id="titulo" placeholder="Título" oninput="toUpperCase(this)">
            <input type="text" id="autor" placeholder="Autor" oninput="toUpperCase(this)">
            <input type="text" id="nacionalidade" placeholder="Nacionalidade" oninput="toUpperCase(this)">
            <input type="text" id="tipo" placeholder="Tipo" oninput="toUpperCase(this)">
            <input type="text" id="genero" placeholder="Gênero" oninput="toUpperCase(this)">
            <input type="number" id="ano" placeholder="Ano" min="0" max="9999">
            <input type="text" id="edicao" placeholder="Edição" oninput="toUpperCase(this)">
            <input type="text" id="editora" placeholder="Editora" oninput="toUpperCase(this)">
            <select id="statusSelect">
                <option value="">Status</option>
                <option value="LIDO">LIDO</option>
                <option value="LENDO">LENDO</option>
                <option value="LER">LER</option>
                <option value="JOGO">JOGO</option>
                <option value="JOGUEI">JOGUEI</option>
                <option value="AINDA NÃO JOGUEI">AINDA NÃO JOGUEI</option>
            </select>
            <input type="number" id="nota" placeholder="Nota" min="0" max="10" step="0.1">
            <button type="button" onclick="addOrUpdateBook()" id="submitBtn">Adicionar</button>
            <button type="button" onclick="clearForm()">Limpar</button>
        </form>
        <table id="booksTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Título</th>
                    <th onclick="sortTable(1)">Autor</th>
                    <th onclick="sortTable(2)">Nacionalidade</th>
                    <th onclick="sortTable(3)">Tipo</th>
                    <th onclick="sortTable(4)">Gênero</th>
                    <th onclick="sortTable(5)">Ano</th>
                    <th onclick="sortTable(6)">Edição</th>
                    <th onclick="sortTable(7)">Editora</th>
                    <th onclick="sortTable(8)">Status</th>
                    <th onclick="sortTable(9)">Nota</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="booksBody"></tbody>
        </table>
        <div id="booksCards"></div>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        import { getDatabase, ref, onValue, set, remove } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDfIj4XwPq-amWJsfBN4BLX4dZB17Wui0g",
            authDomain: "biblioteca-goblin.firebaseapp.com",
            databaseURL: "https://biblioteca-goblin-default-rtdb.firebaseio.com",
            projectId: "biblioteca-goblin",
            storageBucket: "biblioteca-goblin.firebasestorage.app",
            messagingSenderId: "979019511905",
            appId: "1:979019511905:web:c878a73268e149bb409220"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let books = [];
        let editingId = null;

        signInAnonymously(auth).then(() => {
            document.getElementById('status').textContent = 'Online';
            document.getElementById('status').className = 'status online';
            loadBooks();
        }).catch((error) => {
            console.error('Erro ao fazer login anônimo:', error);
            loadFromCache();
        });

        function loadBooks() {
            document.getElementById('spinner').style.display = 'block';
            const booksRef = ref(database, 'books');
            onValue(booksRef, (snapshot) => {
                books = [];
                snapshot.forEach((childSnapshot) => {
                    books.push({ id: childSnapshot.key, ...childSnapshot.val() });
                });
                localStorage.setItem('books', JSON.stringify(books));
                displayBooks(books);
                document.getElementById('spinner').style.display = 'none';
            }, (error) => {
                console.error('Erro ao carregar livros:', error);
                loadFromCache();
            });
        }

        function loadFromCache() {
            const cached = localStorage.getItem('books');
            if (cached) {
                books = JSON.parse(cached);
                displayBooks(books);
            }
            document.getElementById('spinner').style.display = 'none';
        }

        function displayBooks(bookList) {
            const tbody = document.getElementById('booksBody');
            const cards = document.getElementById('booksCards');
            tbody.innerHTML = '';
            cards.innerHTML = '';
            bookList.forEach(book => {
                // Table row
                const row = tbody.insertRow();
                row.insertCell(0).textContent = book.titulo || '';
                row.insertCell(1).textContent = book.autor || '';
                row.insertCell(2).textContent = book.nacionalidade || '';
                row.insertCell(3).textContent = book.tipo || '';
                row.insertCell(4).textContent = book.genero || '';
                row.insertCell(5).textContent = book.ano || '';
                row.insertCell(6).textContent = book.edicao || '';
                row.insertCell(7).textContent = book.editora || '';
                row.insertCell(8).textContent = book.status || '';
                row.insertCell(9).textContent = book.nota || '';
                const actionsCell = row.insertCell(10);
                actionsCell.innerHTML = `<button onclick="editBook('${book.id}')">Editar</button><button onclick="deleteBook('${book.id}')">Deletar</button>`;

                // Card for mobile
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <strong>Título:</strong> ${book.titulo || ''}<br>
                    <strong>Autor:</strong> ${book.autor || ''}<br>
                    <strong>Nacionalidade:</strong> ${book.nacionalidade || ''}<br>
                    <strong>Tipo:</strong> ${book.tipo || ''}<br>
                    <strong>Gênero:</strong> ${book.genero || ''}<br>
                    <strong>Ano:</strong> ${book.ano || ''}<br>
                    <strong>Edição:</strong> ${book.edicao || ''}<br>
                    <strong>Editora:</strong> ${book.editora || ''}<br>
                    <strong>Status:</strong> ${book.status || ''}<br>
                    <strong>Nota:</strong> ${book.nota || ''}<br>
                    <div class="actions">
                        <button onclick="editBook('${book.id}')">Editar</button>
                        <button onclick="deleteBook('${book.id}')">Deletar</button>
                    </div>
                `;
                cards.appendChild(card);
            });
        }

        function addOrUpdateBook() {
            const book = {
                titulo: document.getElementById('titulo').value.toUpperCase(),
                autor: document.getElementById('autor').value.toUpperCase(),
                nacionalidade: document.getElementById('nacionalidade').value.toUpperCase(),
                tipo: document.getElementById('tipo').value.toUpperCase(),
                genero: document.getElementById('genero').value.toUpperCase(),
                ano: document.getElementById('ano').value,
                edicao: document.getElementById('edicao').value.toUpperCase(),
                editora: document.getElementById('editora').value.toUpperCase(),
                status: document.getElementById('statusSelect').value,
                nota: document.getElementById('nota').value
            };
            if (editingId) {
                set(ref(database, 'books/' + editingId), book).catch(() => {
                    updateCache(editingId, book);
                });
                editingId = null;
                document.getElementById('submitBtn').textContent = 'Adicionar';
            } else {
                const newRef = ref(database, 'books').push();
                set(newRef, book).catch(() => {
                    addToCache(book);
                });
            }
            clearForm();
        }

        function editBook(id) {
            const book = books.find(b => b.id === id);
            if (book) {
                document.getElementById('titulo').value = book.titulo || '';
                document.getElementById('autor').value = book.autor || '';
                document.getElementById('nacionalidade').value = book.nacionalidade || '';
                document.getElementById('tipo').value = book.tipo || '';
                document.getElementById('genero').value = book.genero || '';
                document.getElementById('ano').value = book.ano || '';
                document.getElementById('edicao').value = book.edicao || '';
                document.getElementById('editora').value = book.editora || '';
                document.getElementById('statusSelect').value = book.status || '';
                document.getElementById('nota').value = book.nota || '';
                editingId = id;
                document.getElementById('submitBtn').textContent = 'Atualizar';
            }
        }

        function deleteBook(id) {
            if (confirm('Tem certeza que deseja deletar este livro?')) {
                remove(ref(database, 'books/' + id)).catch(() => {
                    removeFromCache(id);
                });
            }
        }

        function clearForm() {
            document.getElementById('bookForm').reset();
            editingId = null;
            document.getElementById('submitBtn').textContent = 'Adicionar';
        }

        function filterBooks() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = books.filter(book => 
                Object.values(book).some(value => 
                    (value || '').toString().toLowerCase().includes(query)
                )
            );
            displayBooks(filtered);
        }

        function sortTable(n) {
            const tbody = document.getElementById('booksBody');
            const rows = Array.from(tbody.rows);
            rows.sort((a, b) => {
                const aVal = a.cells[n].textContent.toLowerCase();
                const bVal = b.cells[n].textContent.toLowerCase();
                if (aVal < bVal) return -1;
                if (aVal > bVal) return 1;
                return 0;
            });
            rows.forEach(row => tbody.appendChild(row));
        }

        function toUpperCase(element) {
            element.value = element.value.toUpperCase();
        }

        function updateCache(id, book) {
            const index = books.findIndex(b => b.id === id);
            if (index !== -1) {
                books[index] = { id, ...book };
                localStorage.setItem('books', JSON.stringify(books));
                displayBooks(books);
            }
        }

        function addToCache(book) {
            const id = Date.now().toString();
            books.push({ id, ...book });
            localStorage.setItem('books', JSON.stringify(books));
            displayBooks(books);
        }

        function removeFromCache(id) {
            books = books.filter(b => b.id !== id);
            localStorage.setItem('books', JSON.stringify(books));
            displayBooks(books);
        }
    </script>
</body>
</html>
