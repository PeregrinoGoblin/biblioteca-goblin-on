<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Goblin</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, push, set, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';
        window.firebase = { initializeApp, getDatabase, ref, push, set, onValue, remove, update };
    </script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #333;
            font-size: clamp(14px, 2vw, 18px);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #4a148c;
            margin-bottom: 20px;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
        }
        .online {
            color: green;
            font-weight: bold;
        }
        form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select, button {
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: inherit;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover {
            transform: scale(1.05);
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 2px;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        th:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
        .card {
            display: none;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 15px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .spinner {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            table { display: none; }
            .card { display: block; }
            form { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Biblioteca Goblin</h1>
        <div class="status" id="status">Offline</div>
        <form id="bookForm">
            <input type="text" id="titulo" placeholder="Título" oninput="this.value = this.value.toUpperCase()" onchange="this.value = this.value.toUpperCase()">
            <input type="text" id="autor" placeholder="Autor" oninput="this.value = this.value.toUpperCase()" onchange="this.value = this.value.toUpperCase()">
            <select id="statusSelect">
                <option value="">Status</option>
                <option value="LIDO">LIDO</option>
                <option value="LENDO">LENDO</option>
                <option value="LER">LER</option>
                <option value="JOGO">JOGO</option>
                <option value="JOGUEI">JOGUEI</option>
                <option value="AINDA NÃO JOGUEI">AINDA NÃO JOGUEI</option>
            </select>
            <input type="number" id="nota" placeholder="Nota" min="0" max="10" step="0.1">
            <button type="submit" id="submitBtn">Adicionar</button>
            <button type="button" id="clearBtn">Limpar</button>
        </form>
        <input type="text" id="search" placeholder="Buscar..." style="width: 100%; margin-bottom: 20px; padding: 10px; border-radius: 10px; border: none;">
        <div class="spinner" id="spinner"></div>
        <div class="table-container">
            <table id="booksTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Título</th>
                        <th onclick="sortTable(1)">Autor</th>
                        <th onclick="sortTable(2)">Status</th>
                        <th onclick="sortTable(3)">Nota</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="booksBody"></tbody>
            </table>
        </div>
        <div id="cardsContainer"></div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDfIj4XwPq-amWJsfBN4BLX4dZB17Wui0g",
            authDomain: "biblioteca-goblin.firebaseapp.com",
            databaseURL: "https://biblioteca-goblin-default-rtdb.firebaseio.com",
            projectId: "biblioteca-goblin",
            storageBucket: "biblioteca-goblin.firebasestorage.app",
            messagingSenderId: "979019511905",
            appId: "1:979019511905:web:c878a73268e149bb409220"
        };
        const app = window.firebase.initializeApp(firebaseConfig);
        const database = window.firebase.getDatabase(app);
        const booksRef = window.firebase.ref(database, 'books');
        let books = [];
        let editingId = null;
        const statusEl = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        const form = document.getElementById('bookForm');
        const searchInput = document.getElementById('search');
        const tableBody = document.getElementById('booksBody');
        const cardsContainer = document.getElementById('cardsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');

        function showSpinner() { spinner.style.display = 'block'; }
        function hideSpinner() { spinner.style.display = 'none'; }

        window.firebase.onValue(booksRef, (snapshot) => {
            statusEl.textContent = 'Online';
            statusEl.classList.add('online');
            books = [];
            snapshot.forEach(child => {
                books.push({ id: child.key, ...child.val() });
            });
            localStorage.setItem('books', JSON.stringify(books));
            renderBooks();
            hideSpinner();
        }, () => {
            statusEl.textContent = 'Offline';
            statusEl.classList.remove('online');
            books = JSON.parse(localStorage.getItem('books')) || [];
            renderBooks();
            hideSpinner();
        });

        function renderBooks() {
            const filtered = books.filter(book => 
                Object.values(book).some(val => val && val.toString().toLowerCase().includes(searchInput.value.toLowerCase()))
            );
            tableBody.innerHTML = '';
            cardsContainer.innerHTML = '';
            filtered.forEach(book => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.titulo || ''}</td>
                    <td>${book.autor || ''}</td>
                    <td>${book.status || ''}</td>
                    <td>${book.nota || ''}</td>
                    <td>
                        <button onclick="editBook('${book.id}')">Editar</button>
                        <button onclick="deleteBook('${book.id}')">Deletar</button>
                    </td>
                `;
                tableBody.appendChild(row);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${book.titulo || ''}</h3>
                    <p><strong>Autor:</strong> ${book.autor || ''}</p>
                    <p><strong>Status:</strong> ${book.status || ''}</p>
                    <p><strong>Nota:</strong> ${book.nota || ''}</p>
                    <button onclick="editBook('${book.id}')">Editar</button>
                    <button onclick="deleteBook('${book.id}')">Deletar</button>
                `;
                cardsContainer.appendChild(card);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const book = {
                titulo: document.getElementById('titulo').value.trim(),
                autor: document.getElementById('autor').value.trim(),
                status: document.getElementById('statusSelect').value,
                nota: document.getElementById('nota').value
            };
            showSpinner();
            if (editingId) {
                window.firebase.update(window.firebase.ref(database, `books/${editingId}`), book);
                editingId = null;
                submitBtn.textContent = 'Adicionar';
            } else {
                window.firebase.push(booksRef, book);
            }
            form.reset();
        });

        clearBtn.addEventListener('click', () => {
            form.reset();
            editingId = null;
            submitBtn.textContent = 'Adicionar';
        });

        searchInput.addEventListener('input', renderBooks);

        window.editBook = (id) => {
            const book = books.find(b => b.id === id);
            if (book) {
                document.getElementById('titulo').value = book.titulo || '';
                document.getElementById('autor').value = book.autor || '';
                document.getElementById('statusSelect').value = book.status || '';
                document.getElementById('nota').value = book.nota || '';
                editingId = id;
                submitBtn.textContent = 'Atualizar';
            }
        };

        window.deleteBook = (id) => {
            if (confirm('Tem certeza que deseja deletar este livro?')) {
                showSpinner();
                window.firebase.remove(window.firebase.ref(database, `books/${id}`));
            }
        };

        window.sortTable = (col) => {
            const cols = ['titulo', 'autor', 'status', 'nota'];
            books.sort((a, b) => (a[cols[col]] || '').localeCompare(b[cols[col]] || ''));
            renderBooks();
        };

        renderBooks();
    </script>
</body>
</html>
