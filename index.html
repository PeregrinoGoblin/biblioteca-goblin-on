<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Goblin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 1rem;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 1rem;
        }
        .status {
            text-align: center;
            margin-bottom: 1rem;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: white;
        }
        .status.online {
            color: #4CAF50;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .form-group {
            flex: 1 1 200px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 0.25rem;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }
        input, select {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: clamp(0.8rem, 2vw, 1rem);
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .search-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        #search {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }
        .table-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
        }
        th, td {
            padding: 0.5rem;
            text-align: left;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }
        th {
            background: #f0f0f0;
            cursor: pointer;
            position: relative;
        }
        th:hover {
            background: #e0e0e0;
        }
        .card-container {
            display: none;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            width: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .spinner {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            .form-container {
                flex-direction: column;
            }
            .table-container {
                display: none;
            }
            .card-container {
                display: flex;
            }
            .card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Biblioteca Goblin</h1>
        <div class="status" id="status">Carregando...</div>
        <div class="form-container" id="form-container">
            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="autor">Autor</label>
                <input type="text" id="autor" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="nacionalidade">Nacionalidade</label>
                <input type="text" id="nacionalidade" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="tipo">Tipo</label>
                <input type="text" id="tipo" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="genero">Gênero</label>
                <input type="text" id="genero" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="ano">Ano</label>
                <input type="number" id="ano" min="0" max="9999">
            </div>
            <div class="form-group">
                <label for="edicao">Edição</label>
                <input type="text" id="edicao" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="editora">Editora</label>
                <input type="text" id="editora" oninput="toUpperCase(this)">
            </div>
            <div class="form-group">
                <label for="status-select">Status</label>
                <select id="status-select">
                    <option value="">Selecione</option>
                    <option value="LIDO">LIDO</option>
                    <option value="LENDO">LENDO</option>
                    <option value="LER">LER</option>
                    <option value="JOGO">JOGO</option>
                    <option value="JOGUEI">JOGUEI</option>
                    <option value="AINDA NÃO JOGUEI">AINDA NÃO JOGUEI</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nota">Nota</label>
                <input type="number" id="nota" min="0" max="10" step="0.1">
            </div>
            <div class="form-group" style="justify-content: flex-end; align-items: flex-end;">
                <button id="add-btn">Adicionar</button>
                <button id="update-btn" style="display: none;">Atualizar</button>
                <button id="clear-btn">Limpar</button>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar...">
        </div>
        <div class="table-container">
            <table id="books-table">
                <thead>
                    <tr>
                        <th data-sort="titulo">Título</th>
                        <th data-sort="autor">Autor</th>
                        <th data-sort="nacionalidade">Nacionalidade</th>
                        <th data-sort="tipo">Tipo</th>
                        <th data-sort="genero">Gênero</th>
                        <th data-sort="ano">Ano</th>
                        <th data-sort="edicao">Edição</th>
                        <th data-sort="editora">Editora</th>
                        <th data-sort="status">Status</th>
                        <th data-sort="nota">Nota</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="books-tbody"></tbody>
            </table>
        </div>
        <div class="card-container" id="card-container"></div>
        <div class="spinner" id="spinner"></div>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js';
        import { getDatabase, ref, onValue, set, remove, update } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDfIj4XwPq-amWJsfBN4BLX4dZB17Wui0g",
            authDomain: "biblioteca-goblin.firebaseapp.com",
            databaseURL: "https://biblioteca-goblin-default-rtdb.firebaseio.com",
            projectId: "biblioteca-goblin",
            storageBucket: "biblioteca-goblin.firebasestorage.app",
            messagingSenderId: "979019511905",
            appId: "1:979019511905:web:c878a73268e149bb409220"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentEditId = null;
        let books = [];
        let sortDirection = {};

        signInAnonymously(auth).then(() => {
            console.log('Autenticação anônima bem-sucedida');
            document.getElementById('status').textContent = 'Online';
            document.getElementById('status').classList.add('online');
            loadBooks();
        }).catch((error) => {
            console.error('Erro na autenticação:', error);
            document.getElementById('status').textContent = 'Offline';
            loadFromLocalStorage();
        });

        function loadBooks() {
            const booksRef = ref(db, 'books');
            onValue(booksRef, (snapshot) => {
                books = snapshot.val() || {};
                localStorage.setItem('books', JSON.stringify(books));
                renderBooks();
            }, (error) => {
                console.error('Erro ao carregar livros:', error);
                loadFromLocalStorage();
            });
        }

        function loadFromLocalStorage() {
            books = JSON.parse(localStorage.getItem('books')) || {};
            renderBooks();
        }

        function renderBooks() {
            const tbody = document.getElementById('books-tbody');
            const cardContainer = document.getElementById('card-container');
            tbody.innerHTML = '';
            cardContainer.innerHTML = '';
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filteredBooks = Object.entries(books).filter(([id, book]) => {
                return Object.values(book).some(value => value && value.toString().toLowerCase().includes(searchTerm));
            });
            filteredBooks.forEach(([id, book]) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.titulo || ''}</td>
                    <td>${book.autor || ''}</td>
                    <td>${book.nacionalidade || ''}</td>
                    <td>${book.tipo || ''}</td>
                    <td>${book.genero || ''}</td>
                    <td>${book.ano || ''}</td>
                    <td>${book.edicao || ''}</td>
                    <td>${book.editora || ''}</td>
                    <td>${book.status || ''}</td>
                    <td>${book.nota || ''}</td>
                    <td>
                        <button onclick="editBook('${id}')">Editar</button>
                        <button onclick="deleteBook('${id}')">Deletar</button>
                    </td>
                `;
                tbody.appendChild(row);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${book.titulo || ''}</h3>
                    <p><strong>Autor:</strong> ${book.autor || ''}</p>
                    <p><strong>Nacionalidade:</strong> ${book.nacionalidade || ''}</p>
                    <p><strong>Tipo:</strong> ${book.tipo || ''}</p>
                    <p><strong>Gênero:</strong> ${book.genero || ''}</p>
                    <p><strong>Ano:</strong> ${book.ano || ''}</p>
                    <p><strong>Edição:</strong> ${book.edicao || ''}</p>
                    <p><strong>Editora:</strong> ${book.editora || ''}</p>
                    <p><strong>Status:</strong> ${book.status || ''}</p>
                    <p><strong>Nota:</strong> ${book.nota || ''}</p>
                    <button onclick="editBook('${id}')">Editar</button>
                    <button onclick="deleteBook('${id}')">Deletar</button>
                `;
                cardContainer.appendChild(card);
            });
            document.getElementById('spinner').style.display = 'none';
        }

        function addBook() {
            const book = {
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                nacionalidade: document.getElementById('nacionalidade').value,
                tipo: document.getElementById('tipo').value,
                genero: document.getElementById('genero').value,
                ano: document.getElementById('ano').value,
                edicao: document.getElementById('edicao').value,
                editora: document.getElementById('editora').value,
                status: document.getElementById('status-select').value,
                nota: document.getElementById('nota').value
            };
            const newBookRef = ref(db, 'books/' + Date.now());
            set(newBookRef, book).then(() => {
                console.log('Livro adicionado');
                clearForm();
            }).catch((error) => {
                console.error('Erro ao adicionar livro:', error);
            });
        }

        function editBook(id) {
            currentEditId = id;
            const book = books[id];
            document.getElementById('titulo').value = book.titulo || '';
            document.getElementById('autor').value = book.autor || '';
            document.getElementById('nacionalidade').value = book.nacionalidade || '';
            document.getElementById('tipo').value = book.tipo || '';
            document.getElementById('genero').value = book.genero || '';
            document.getElementById('ano').value = book.ano || '';
            document.getElementById('edicao').value = book.edicao || '';
            document.getElementById('editora').value = book.editora || '';
            document.getElementById('status-select').value = book.status || '';
            document.getElementById('nota').value = book.nota || '';
            document.getElementById('add-btn').style.display = 'none';
            document.getElementById('update-btn').style.display = 'inline';
        }

        function updateBook() {
            const book = {
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                nacionalidade: document.getElementById('nacionalidade').value,
                tipo: document.getElementById('tipo').value,
                genero: document.getElementById('genero').value,
                ano: document.getElementById('ano').value,
                edicao: document.getElementById('edicao').value,
                editora: document.getElementById('editora').value,
                status: document.getElementById('status-select').value,
                nota: document.getElementById('nota').value
            };
            const bookRef = ref(db, 'books/' + currentEditId);
            update(bookRef, book).then(() => {
                console.log('Livro atualizado');
                clearForm();
            }).catch((error) => {
                console.error('Erro ao atualizar livro:', error);
            });
        }

        function deleteBook(id) {
            if (confirm('Tem certeza que deseja deletar este livro?')) {
                const bookRef = ref(db, 'books/' + id);
                remove(bookRef).then(() => {
                    console.log('Livro deletado');
                }).catch((error) => {
                    console.error('Erro ao deletar livro:', error);
                });
            }
        }

        function clearForm() {
            document.getElementById('titulo').value = '';
            document.getElementById('autor').value = '';
            document.getElementById('nacionalidade').value = '';
            document.getElementById('tipo').value = '';
            document.getElementById('genero').value = '';
            document.getElementById('ano').value = '';
            document.getElementById('edicao').value = '';
            document.getElementById('editora').value = '';
            document.getElementById('status-select').value = '';
            document.getElementById('nota').value = '';
            document.getElementById('add-btn').style.display = 'inline';
            document.getElementById('update-btn').style.display = 'none';
            currentEditId = null;
        }

        function toUpperCase(element) {
            element.value = element.value.toUpperCase();
        }

        document.getElementById('add-btn').addEventListener('click', addBook);
        document.getElementById('update-btn').addEventListener('click', updateBook);
        document.getElementById('clear-btn').addEventListener('click', clearForm);
        document.getElementById('search').addEventListener('input', renderBooks);

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.sort;
                sortDirection[key] = !sortDirection[key];
                const sorted = Object.entries(books).sort((a, b) => {
                    const valA = a[1][key] || '';
                    const valB = b[1][key] || '';
                    if (sortDirection[key]) {
                        return valA.localeCompare(valB);
                    } else {
                        return valB.localeCompare(valA);
                    }
                });
                books = Object.fromEntries(sorted);
                renderBooks();
            });
        });

        window.editBook = editBook;
        window.deleteBook = deleteBook;
    </script>
</body>
</html>
