<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Goblin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 20px; }
        input, select { flex: 1; min-width: 100px; padding: 5px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { cursor: pointer; background-color: #f2f2f2; }
        button { padding: 5px 10px; margin: 2px; }
        #status { margin-bottom: 10px; font-weight: bold; }
        #spinner { display: none; margin-bottom: 10px; }
        @media (max-width: 600px) { form { flex-direction: column; } }
    </style>
</head>
<body>
    <h1>Biblioteca Goblin</h1>
    <div id="status">Desconectado</div>
    <div id="spinner">Carregando...</div>
    <form id="bookForm">
        <input type="text" id="titulo" placeholder="Título" required>
        <input type="text" id="autor" placeholder="Autor" required>
        <input type="text" id="nacionalidade" placeholder="Nacionalidade" required>
        <input type="text" id="tipo" placeholder="Tipo" required>
        <input type="text" id="genero" placeholder="Gênero" required>
        <input type="number" id="ano" placeholder="Ano" required>
        <input type="text" id="edicao" placeholder="Edição" required>
        <input type="text" id="editora" placeholder="Editora" required>
        <select id="statusLivro" required>
            <option value="">Status</option>
            <option value="LIDO">LIDO</option>
            <option value="LENDO">LENDO</option>
            <option value="LER">LER</option>
            <option value="JOGO">JOGO</option>
            <option value="JOGUEI">JOGUEI</option>
            <option value="AINDA NÃO JOGUEI">AINDA NÃO JOGUEI</option>
        </select>
        <input type="number" id="nota" placeholder="Nota" min="0" max="10" step="0.1" required>
        <button type="submit">Adicionar</button>
        <button type="button" id="clearBtn">Limpar</button>
    </form>
    <input type="text" id="search" placeholder="Buscar..." style="width: 100%; padding: 5px; margin-bottom: 10px;">
    <table id="booksTable">
        <thead>
            <tr>
                <th data-sort="titulo">Título</th>
                <th data-sort="autor">Autor</th>
                <th data-sort="nacionalidade">Nacionalidade</th>
                <th data-sort="tipo">Tipo</th>
                <th data-sort="genero">Gênero</th>
                <th data-sort="ano">Ano</th>
                <th data-sort="edicao">Edição</th>
                <th data-sort="editora">Editora</th>
                <th data-sort="status">Status</th>
                <th data-sort="nota">Nota</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js';
        import { getDatabase, ref, onValue, set, remove } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';

        // Configuração do Firebase (substitua pelos seus valores reais)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const booksRef = ref(db, 'books');
        let books = {};
        let editingId = null;
        let connected = false;

        // Autenticação anônima
        signInAnonymously(auth).then(() => {
            connected = true;
            document.getElementById('status').textContent = 'Conectado ao Firebase';
            document.getElementById('spinner').style.display = 'none';
        }).catch((error) => {
            console.error('Erro na autenticação:', error);
            document.getElementById('status').textContent = 'Erro na conexão';
            loadFromCache();
        });

        // Carregar livros em tempo real
        onValue(booksRef, (snapshot) => {
            if (connected) {
                books = snapshot.val() || {};
                saveToCache(books);
                renderTable();
            }
        }, (error) => {
            console.error('Erro ao carregar dados:', error);
            loadFromCache();
        });

        // Cache offline
        function saveToCache(data) {
            localStorage.setItem('booksCache', JSON.stringify(data));
        }
        function loadFromCache() {
            const cached = localStorage.getItem('booksCache');
            if (cached) {
                books = JSON.parse(cached);
                renderTable();
            }
        }

        // Forçar maiúsculas
        document.querySelectorAll('input[type="text"]').forEach(input => {
            input.addEventListener('input', () => input.value = input.value.toUpperCase());
            input.addEventListener('change', () => input.value = input.value.toUpperCase());
        });

        // Formulário
        document.getElementById('bookForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const book = {
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                nacionalidade: document.getElementById('nacionalidade').value,
                tipo: document.getElementById('tipo').value,
                genero: document.getElementById('genero').value,
                ano: parseInt(document.getElementById('ano').value),
                edicao: document.getElementById('edicao').value,
                editora: document.getElementById('editora').value,
                status: document.getElementById('statusLivro').value,
                nota: parseFloat(document.getElementById('nota').value)
            };
            if (editingId) {
                set(ref(db, 'books/' + editingId), book);
                editingId = null;
            } else {
                const newId = Date.now().toString();
                set(ref(db, 'books/' + newId), book);
            }
            document.getElementById('bookForm').reset();
        });

        // Limpar
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('bookForm').reset();
            editingId = null;
        });

        // Busca
        document.getElementById('search').addEventListener('input', renderTable);

        // Ordenação
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.sort;
                const sorted = Object.entries(books).sort((a, b) => {
                    if (a[1][key] < b[1][key]) return -1;
                    if (a[1][key] > b[1][key]) return 1;
                    return 0;
                });
                books = Object.fromEntries(sorted);
                renderTable();
            });
        });

        // Renderizar tabela
        function renderTable() {
            const tbody = document.querySelector('#booksTable tbody');
            tbody.innerHTML = '';
            const searchTerm = document.getElementById('search').value.toLowerCase();
            Object.entries(books).forEach(([id, book]) => {
                if (Object.values(book).some(val => val.toString().toLowerCase().includes(searchTerm))) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${book.titulo}</td>
                        <td>${book.autor}</td>
                        <td>${book.nacionalidade}</td>
                        <td>${book.tipo}</td>
                        <td>${book.genero}</td>
                        <td>${book.ano}</td>
                        <td>${book.edicao}</td>
                        <td>${book.editora}</td>
                        <td>${book.status}</td>
                        <td>${book.nota}</td>
                        <td>
                            <button onclick="editBook('${id}')">Editar</button>
                            <button onclick="deleteBook('${id}')">Deletar</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        // Editar
        window.editBook = (id) => {
            const book = books[id];
            document.getElementById('titulo').value = book.titulo;
            document.getElementById('autor').value = book.autor;
            document.getElementById('nacionalidade').value = book.nacionalidade;
            document.getElementById('tipo').value = book.tipo;
            document.getElementById('genero').value = book.genero;
            document.getElementById('ano').value = book.ano;
            document.getElementById('edicao').value = book.edicao;
            document.getElementById('editora').value = book.editora;
            document.getElementById('statusLivro').value = book.status;
            document.getElementById('nota').value = book.nota;
            editingId = id;
        };

        // Deletar
        window.deleteBook = (id) => {
            if (confirm('Tem certeza que deseja deletar este livro?')) {
                remove(ref(db, 'books/' + id));
            }
        };

        // Inicializar
        document.getElementById('spinner').style.display = 'block';
        loadFromCache(); // Carregar cache inicialmente

        /*
        Instruções para o usuário:
        1. Acesse https://console.firebase.google.com/ e crie um projeto gratuito.
        2. No painel do projeto, vá para "Configurações do projeto" > "Configurações gerais" e copie a configuração do SDK (apiKey, authDomain, etc.).
        3. Substitua os valores no objeto firebaseConfig acima pelos seus valores reais.
        4. Ative o Realtime Database no Firebase Console e defina as regras para permitir leitura/escrita (por exemplo, { "rules": { ".read": true, ".write": true } }).
        */
    </script>
</body>
</html>
