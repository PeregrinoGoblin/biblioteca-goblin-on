<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Goblin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        form { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 20px; background-color: #fff; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        form div { display: flex; flex-direction: column; flex: 1 1 150px; min-width: 120px; }
        label { font-size: 12px; margin-bottom: 2px; }
        input, select { padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
        button { padding: 8px 12px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; margin: 5px; }
        button:hover { background-color: #218838; }
        #search { width: 100%; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; cursor: pointer; }
        th:hover { background-color: #e9e9e9; }
        .actions button { margin: 0 2px; }
        @media (max-width: 600px) { form div { flex: 1 1 100%; } }
    </style>
</head>
<body>
    <h1>Biblioteca Goblin</h1>
    <form id="bookForm">
        <div><label for="titulo">Título:</label><input type="text" id="titulo" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="autor">Autor:</label><input type="text" id="autor" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="nacionalidade">Nacionalidade:</label><input type="text" id="nacionalidade" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="tipo">Tipo:</label><input type="text" id="tipo" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="genero">Gênero:</label><input type="text" id="genero" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="ano">Ano:</label><input type="number" id="ano" required></div>
        <div><label for="edicao">Edição:</label><input type="text" id="edicao" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="editora">Editora:</label><input type="text" id="editora" oninput="this.value = this.value.toUpperCase();" required></div>
        <div><label for="status">Status:</label><select id="status" onchange="this.value = this.value.toUpperCase();" required>
            <option value="LIDO">LIDO</option>
            <option value="LENDO">LENDO</option>
            <option value="LER">LER</option>
            <option value="JOGO">JOGO</option>
            <option value="JOGUEI">JOGUEI</option>
            <option value="AINDA NÃO JOGUEI">AINDA NÃO JOGUEI</option>
        </select></div>
        <div><label for="nota">Nota:</label><input type="number" id="nota" min="0" max="10" step="0.1" required></div>
        <button type="submit">Salvar</button>
        <button type="button" onclick="clearForm()">Limpar</button>
    </form>
    <input type="text" id="search" placeholder="Buscar..." oninput="filterTable()">
    <table id="bookTable">
        <thead>
            <tr>
                <th onclick="sortTable(0)">Título</th>
                <th onclick="sortTable(1)">Autor</th>
                <th onclick="sortTable(2)">Nacionalidade</th>
                <th onclick="sortTable(3)">Tipo</th>
                <th onclick="sortTable(4)">Gênero</th>
                <th onclick="sortTable(5)">Ano</th>
                <th onclick="sortTable(6)">Edição</th>
                <th onclick="sortTable(7)">Editora</th>
                <th onclick="sortTable(8)">Status</th>
                <th onclick="sortTable(9)">Nota</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="bookTableBody"></tbody>
    </table>
    <script>
        let db;
        const request = indexedDB.open('BibliotecaGoblin', 1);
        request.onupgradeneeded = function(event) {
            db = event.target.result;
            const objectStore = db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
            objectStore.createIndex('titulo', 'titulo', { unique: false });
            objectStore.createIndex('autor', 'autor', { unique: false });
            objectStore.createIndex('nacionalidade', 'nacionalidade', { unique: false });
            objectStore.createIndex('tipo', 'tipo', { unique: false });
            objectStore.createIndex('genero', 'genero', { unique: false });
            objectStore.createIndex('ano', 'ano', { unique: false });
            objectStore.createIndex('edicao', 'edicao', { unique: false });
            objectStore.createIndex('editora', 'editora', { unique: false });
            objectStore.createIndex('status', 'status', { unique: false });
            objectStore.createIndex('nota', 'nota', { unique: false });
        };
        request.onsuccess = function(event) {
            db = event.target.result;
            loadBooks();
        };
        request.onerror = function(event) {
            console.error('Erro ao abrir IndexedDB:', event.target.error);
        };
        document.getElementById('bookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const book = {
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                nacionalidade: document.getElementById('nacionalidade').value,
                tipo: document.getElementById('tipo').value,
                genero: document.getElementById('genero').value,
                ano: parseInt(document.getElementById('ano').value),
                edicao: document.getElementById('edicao').value,
                editora: document.getElementById('editora').value,
                status: document.getElementById('status').value,
                nota: parseFloat(document.getElementById('nota').value)
            };
            const transaction = db.transaction(['books'], 'readwrite');
            const objectStore = transaction.objectStore('books');
            const request = objectStore.add(book);
            request.onsuccess = function() {
                loadBooks();
                clearForm();
            };
            request.onerror = function(event) {
                console.error('Erro ao salvar livro:', event.target.error);
            };
        });
        function loadBooks() {
            const transaction = db.transaction(['books'], 'readonly');
            const objectStore = transaction.objectStore('books');
            const request = objectStore.getAll();
            request.onsuccess = function(event) {
                const books = event.target.result;
                displayBooks(books);
            };
        }
        function displayBooks(books) {
            const tbody = document.getElementById('bookTableBody');
            tbody.innerHTML = '';
            books.forEach(book => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${book.titulo}</td>
                    <td>${book.autor}</td>
                    <td>${book.nacionalidade}</td>
                    <td>${book.tipo}</td>
                    <td>${book.genero}</td>
                    <td>${book.ano}</td>
                    <td>${book.edicao}</td>
                    <td>${book.editora}</td>
                    <td>${book.status}</td>
                    <td>${book.nota}</td>
                    <td class="actions">
                        <button onclick="editBook(${book.id})">Editar</button>
                        <button onclick="deleteBook(${book.id})">Deletar</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        function editBook(id) {
            const transaction = db.transaction(['books'], 'readonly');
            const objectStore = transaction.objectStore('books');
            const request = objectStore.get(id);
            request.onsuccess = function(event) {
                const book = event.target.result;
                document.getElementById('titulo').value = book.titulo;
                document.getElementById('autor').value = book.autor;
                document.getElementById('nacionalidade').value = book.nacionalidade;
                document.getElementById('tipo').value = book.tipo;
                document.getElementById('genero').value = book.genero;
                document.getElementById('ano').value = book.ano;
                document.getElementById('edicao').value = book.edicao;
                document.getElementById('editora').value = book.editora;
                document.getElementById('status').value = book.status;
                document.getElementById('nota').value = book.nota;
                document.getElementById('bookForm').dataset.editingId = id;
                document.querySelector('button[type="submit"]').textContent = 'Atualizar';
            };
        }
        document.getElementById('bookForm').addEventListener('submit', function(e) {
            if (this.dataset.editingId) {
                e.preventDefault();
                const id = parseInt(this.dataset.editingId);
                const book = {
                    titulo: document.getElementById('titulo').value,
                    autor: document.getElementById('autor').value,
                    nacionalidade: document.getElementById('nacionalidade').value,
                    tipo: document.getElementById('tipo').value,
                    genero: document.getElementById('genero').value,
                    ano: parseInt(document.getElementById('ano').value),
                    edicao: document.getElementById('edicao').value,
                    editora: document.getElementById('editora').value,
                    status: document.getElementById('status').value,
                    nota: parseFloat(document.getElementById('nota').value),
                    id: id
                };
                const transaction = db.transaction(['books'], 'readwrite');
                const objectStore = transaction.objectStore('books');
                const request = objectStore.put(book);
                request.onsuccess = function() {
                    loadBooks();
                    clearForm();
                    delete document.getElementById('bookForm').dataset.editingId;
                    document.querySelector('button[type="submit"]').textContent = 'Salvar';
                };
                request.onerror = function(event) {
                    console.error('Erro ao atualizar livro:', event.target.error);
                };
            }
        });
        function deleteBook(id) {
            if (confirm('Tem certeza que deseja deletar este livro?')) {
                const transaction = db.transaction(['books'], 'readwrite');
                const objectStore = transaction.objectStore('books');
                const request = objectStore.delete(id);
                request.onsuccess = function() {
                    loadBooks();
                };
                request.onerror = function(event) {
                    console.error('Erro ao deletar livro:', event.target.error);
                };
            }
        }
        function clearForm() {
            document.getElementById('bookForm').reset();
            delete document.getElementById('bookForm').dataset.editingId;
            document.querySelector('button[type="submit"]').textContent = 'Salvar';
        }
        function filterTable() {
            const filter = document.getElementById('search').value.toUpperCase();
            const rows = document.querySelectorAll('#bookTableBody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                let match = false;
                for (let i = 0; i < cells.length - 1; i++) {
                    if (cells[i].textContent.toUpperCase().includes(filter)) {
                        match = true;
                        break;
                    }
                }
                row.style.display = match ? '' : 'none';
            });
        }
        function sortTable(column) {
            const tbody = document.getElementById('bookTableBody');
            const rows = Array.from(tbody.rows);
            rows.sort((a, b) => {
                const aText = a.cells[column].textContent.trim();
                const bText = b.cells[column].textContent.trim();
                if (column === 5 || column === 9) { // Ano or Nota
                    return parseFloat(aText) - parseFloat(bText);
                } else {
                    return aText.localeCompare(bText);
                }
            });
            rows.forEach(row => tbody.appendChild(row));
        }
    </script>
</body>
</html>
